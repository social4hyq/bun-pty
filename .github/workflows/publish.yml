name: Publish Package

on:
  release: { types: [created, edited] }
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  RELEASE_DIR: rust-pty/target/release

jobs:
  build-libs:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # glibc 2.17 builds (RHEL 7+, CentOS 7+, Ubuntu 14.04+, Debian 8+)
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            zigbuild_target: x86_64-unknown-linux-gnu.2.17
            out:    librust_pty.so
          - runner: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            zigbuild_target: aarch64-unknown-linux-gnu.2.17
            out:    librust_pty_arm64.so
          # musl builds (Alpine Linux and other musl-based distros)
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            zigbuild_target: x86_64-unknown-linux-musl
            out:    librust_pty_musl.so
            rustflags: -C target-feature=-crt-static
          - runner: ubuntu-22.04
            target: aarch64-unknown-linux-musl
            zigbuild_target: aarch64-unknown-linux-musl
            out:    librust_pty_arm64_musl.so
            rustflags: -C target-feature=-crt-static
          - runner: macos-latest
            target: x86_64-apple-darwin
            out:    librust_pty.dylib
          - runner: macos-latest
            target: aarch64-apple-darwin
            out:    librust_pty_arm64.dylib
          - runner: windows-latest
            target: x86_64-pc-windows-gnu
            out:    rust_pty.dll

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install zigbuild
        if: matrix.zigbuild_target
        run: |
          pip3 install ziglang
          cargo install cargo-zigbuild

      - name: Build rust-pty (Linux with zigbuild)
        if: matrix.zigbuild_target
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: |
          cd rust-pty
          cargo zigbuild --release --target ${{ matrix.zigbuild_target }}

      - name: Build rust-pty
        if: "!matrix.zigbuild_target"
        run: |
          cd rust-pty
          cargo build --release --target ${{ matrix.target }}

      - name: Collect artefact
        shell: bash
        run: |
          mkdir -p out
          shopt -s nullglob
          src=(rust-pty/target/${{ matrix.target }}/release/*.{so,dylib,dll})
          [[ ${#src[@]} -gt 0 ]] || { echo "❌ no lib"; exit 1; }
          cp "${src[0]}" "out/${{ matrix.out }}"

      - uses: actions/upload-artifact@v4
        with:
          name: compiled-libs-${{ matrix.target }}
          path: out/*

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: out/*
          fail_on_unmatched_files: true

  build-ohos:
    name: Build aarch64-unknown-linux-ohos
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-ohos

      - uses: Swatinem/rust-cache@v2

      - name: Setup OpenHarmony SDK
        uses: Boshen/setup-ohos-sdk@edb865a89a712f1f15dbad932dfa9cfce849d95c # v1.0.0

      - name: Configure OHOS linker
        run: |
          cat > /tmp/aarch64-linux-ohos-clang <<'WRAPPER'
          #!/bin/sh
          exec "${OHOS_SDK_NATIVE}/llvm/bin/clang" --target=aarch64-linux-ohos "$@"
          WRAPPER
          chmod +x /tmp/aarch64-linux-ohos-clang

      - name: Build rust-pty (OHOS)
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_OHOS_LINKER: /tmp/aarch64-linux-ohos-clang
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_OHOS_RUSTFLAGS: -C link-arg=-fuse-ld=lld -C link-arg=-lm
        run: |
          cd rust-pty
          cargo build --release --target aarch64-unknown-linux-ohos

      - name: Collect + sign artefact
        run: |
          mkdir -p out
          cp rust-pty/target/aarch64-unknown-linux-ohos/release/librust_pty.so out/librust_pty_arm64_ohos.so
          python3 scripts/ohos/self-sign.py out/librust_pty_arm64_ohos.so

      - uses: actions/upload-artifact@v4
        with:
          name: compiled-libs-aarch64-unknown-linux-ohos
          path: out/*

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: out/*
          fail_on_unmatched_files: true

  publish:
    needs: [build-libs, build-ohos]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install JS deps
        run: bun install

      - name: Download all compiled libs
        uses: actions/download-artifact@v4
        with:
          path: downloaded-libs

      - name: Move compiled libs into final release path
        run: |
          mkdir -p ${{ env.RELEASE_DIR }}
          find downloaded-libs -type f \( -name '*.so' -o -name '*.dylib' -o -name '*.dll' \) -exec cp {} ${{ env.RELEASE_DIR }}/ \;

      - name: List bundled libs
        run: ls -R ${{ env.RELEASE_DIR }}

      - name: Build TypeScript declarations
        run: bun run build:ts

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish
